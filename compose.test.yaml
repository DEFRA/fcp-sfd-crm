services:
  fcp-sfd-crm:
    build:
      target: development
    image: fcp-sfd-crm-development
    container_name: fcp-sfd-crm-test
    command: npm run test
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3009
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      CRM_AUTH_ENDPOINT: https://dummy-token-endpoint
      CRM_AUTH_CLIENT_ID: dummy-client-id
      CRM_AUTH_CLIENT_SECRET: dummy-client-secret
      CRM_AUTH_TENANT_ID: dummy-tenant-id
      CRM_AUTH_SCOPE: dummy-scope
      CRM_AUTH_FEDERATED_AUDIENCE: dummy-audience
      CRM_AUTH_FEDERATED_MOCK: 'true'
      CRM_API_BASE_URL: https://dummy-crm-url
      HTTP_RETRY_MAX_ATTEMPTS: 3
      HTTP_RETRY_BASE_DELAY_MS: 500
      HTTP_RETRY_BACKOFF_MULTIPLIER: 1.5
      HTTP_RETRY_JITTER_PERCENTAGE: 15
      HTTP_RETRY_MAX_DELAY_MS: 15000
      CRM_HTTP_TIMEOUT_MS: 10000
      CRM_AUTH_HTTP_TIMEOUT_MS: 5000
      RETRY_UNKNOWN_MAX_ATTEMPTS: 2
      RETRY_UNKNOWN_MAX_DELAY_MS: 10000
      CRM_QUEUE_URL: http://floci:4566/000000000000/fcp_sfd_crm_requests
      CRM_DEAD_LETTER_QUEUE_URL: http://floci:4566/000000000000/fcp_sfd_crm_requests-deadletter
      CRM_EVENTS_TOPIC_ARN: arn:aws:sns:eu-west-2:000000000000:fcp_sfd_crm_events
      AWS_SQS_ENDPOINT: http://floci:4566
      AWS_SNS_ENDPOINT: http://floci:4566
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./src/:/home/node/src
      - ./test/:/home/node/test
      - ./package.json:/home/node/package.json
      - ./coverage:/home/node/coverage
    networks:
      - fcp-sfd
