version: 2

updates:
- package-ecosystem: docker-compose
  directory: "/"
  schedule:
    interval: daily
  commit-message:
    prefix: chore
  open-pull-requests-limit: 5
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  commit-message:
    prefix: chore
  groups:
    npm-production:
      applies-to: version-updates
      dependency-type: production
      patterns:
      - "*"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: chore
