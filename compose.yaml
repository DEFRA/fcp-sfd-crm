services:
  fcp-sfd-crm:
    build:
      target: development
    image: fcp-sfd-crm-development
    container_name: fcp-sfd-crm-development
    links:
      - "floci:floci"
      - "mongodb:mongodb"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    volumes:
      - ./src/:/home/node/src
      - ./package.json:/home/node/package.json
    env_file:
      - .env
    environment:
      PORT: 3009
      PORT_DEBUG: 9232
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      CRM_AUTH_ENDPOINT: ${CRM_AUTH_ENDPOINT}
      CRM_AUTH_CLIENT_ID: ${CRM_AUTH_CLIENT_ID}
      CRM_AUTH_CLIENT_SECRET: ${CRM_AUTH_CLIENT_SECRET}
      CRM_AUTH_SCOPE: ${CRM_AUTH_SCOPE}
      CRM_API_BASE_URL: ${CRM_API_BASE_URL}
      HTTP_RETRY_MAX_ATTEMPTS: ${HTTP_RETRY_MAX_ATTEMPTS:-3}
      HTTP_RETRY_BASE_DELAY_MS: ${HTTP_RETRY_BASE_DELAY_MS:-500}
      HTTP_RETRY_BACKOFF_MULTIPLIER: ${HTTP_RETRY_BACKOFF_MULTIPLIER:-1.5}
      HTTP_RETRY_JITTER_PERCENTAGE: ${HTTP_RETRY_JITTER_PERCENTAGE:-15}
      HTTP_RETRY_MAX_DELAY_MS: ${HTTP_RETRY_MAX_DELAY_MS:-15000}
      CRM_HTTP_TIMEOUT_MS: ${CRM_HTTP_TIMEOUT_MS:-10000}
      CRM_AUTH_HTTP_TIMEOUT_MS: ${CRM_AUTH_HTTP_TIMEOUT_MS:-5000}
      RETRY_UNKNOWN_MAX_ATTEMPTS: ${RETRY_UNKNOWN_MAX_ATTEMPTS:-2}
      RETRY_UNKNOWN_MAX_DELAY_MS: ${RETRY_UNKNOWN_MAX_DELAY_MS:-10000}
      CRM_QUEUE_URL: ${CRM_QUEUE_URL}
      CRM_DEAD_LETTER_QUEUE_URL: ${CRM_DEAD_LETTER_QUEUE_URL}
      API_KEY_FOR_TESTING_CASE_CREATION: ${API_KEY_FOR_TESTING_CASE_CREATION}
      AWS_SQS_ENDPOINT: http://floci:4566
      AWS_SNS_ENDPOINT: http://floci:4566
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      CRM_EVENTS_TOPIC_ARN: ${CRM_EVENTS_TOPIC_ARN}
      CRM_EVENTS_PUBLISH_DLQ_URL: ${CRM_EVENTS_PUBLISH_DLQ_URL:-http://floci:4566/000000000000/fcp_sfd_crm_requests-deadletter}
      AUDIT_TOPIC_ARN: arn:aws:sns:eu-west-2:000000000000:fcp_audit_fcp_sfd_crm
    networks:
      - fcp-sfd

  floci:
    image: floci/floci:1.5.32
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - floci-data:/app/data
    networks:
      - fcp-sfd

  floci-init:
    image: amazon/aws-cli:latest
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - ./floci/init.sh:/setup/init.sh
    networks:
      - fcp-sfd

  mongodb:
    image: mongo:8.2.11
    networks:
      - fcp-sfd
    volumes:
      - mongodb-data:/data

volumes:
  mongodb-data:
  floci-data:

networks:
  fcp-sfd:
    driver: bridge
    name: fcp-sfd
